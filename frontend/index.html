<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <link rel="script" href="/frontend/script.js">
    <style>
        /* 1. ONDE VAI O ESTILO (CSS) */
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background-color: #0f0f0f; 
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .calculadora {
            width: 420px; 
            background: linear-gradient(145deg, #1e1e1e, #111111);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 20px 20px 60px #080808, -5px -5px 20px #252525;
        }

        #visor {
            width: 100%;
            height: 100px;
            background: transparent;
            color: #ffffff;
            border: none;
            text-align: right;
            padding: 20px;
            font-size: 4rem;
            font-weight: 300;
            margin-bottom: 30px;
            box-sizing: border-box;
            outline: none;
        }

        .corpo-calculadora {
            display: flex; 
            gap: 20px;
        }

        .grade-numeros {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            flex: 3;
        }

        .grade-operacoes {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        button {
            height: 75px;
            border-radius: 22px;
            border: none;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            color: #e0e0e0;
            transition: all 0.2s ease;
            background: linear-gradient(145deg, #2a2a2a, #212121);
            box-shadow: 5px 5px 10px #0a0a0a, -2px -2px 10px #303030;
        }

        button:hover {
            transform: translateY(-3px);
            background: linear-gradient(145deg, #323232, #282828);
            color: #ffffff;
        }

        button:active {
            transform: translateY(1px);
            box-shadow: inset 2px 2px 5px #0a0a0a, inset -1px -1px 3px #353535;
        }

        .btn-del { 
            /* Um degradê vermelho profissional */
            background: linear-gradient(145deg, #e74c3c, #c0392b) !important; 
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .btn-del:hover {
            background: linear-gradient(145deg, #ff4d4d, #d44232) !important;
            transform: translateY(-3px);
        }
        }

        .btn-operacao { 
            background: #333; 
            color: #ff9f0a; 
        }

        .btn-limpar {
            background: #333;
            color: #30d158;
        }

        .btn-igual { 
            background: linear-gradient(145deg, #30d158, #28a745);
            color: white;
            flex-grow: 1;
            height: auto !important;
        }

        .btn-zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <input type="text" id="visor" disabled placeholder="0">
        
        <div class="corpo-calculadora">
            <div class="grade-numeros">
                <button class="btn-limpar" onclick="limpar()">C</button>
                <button class="btn-del" onclick="apagar()">DEL</button>
                <button class="btn-operacao" onclick="digitar('.')">.</button>
                
                <button onclick="digitar('7')">7</button>
                <button onclick="digitar('8')">8</button>
                <button onclick="digitar('9')">9</button>
                
                <button onclick="digitar('4')">4</button>
                <button onclick="digitar('5')">5</button>
                <button onclick="digitar('6')">6</button>
                
                <button onclick="digitar('1')">1</button>
                <button onclick="digitar('2')">2</button>
                <button onclick="digitar('3')">3</button>
                
                <button class="btn-zero" onclick="digitar('0')">0</button>
            </div>

            <div class="grade-operacoes">
                <button class="btn-operacao" onclick="digitar('/')">÷</button>
                <button class="btn-operacao" onclick="digitar('*')">×</button>
                <button class="btn-operacao" onclick="digitar('-')">-</button>
                <button class="btn-operacao" onclick="digitar('+')">+</button>
                <button class="btn-igual" onclick="calcular()">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
